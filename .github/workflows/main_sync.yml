name: 4-Hour War Room Sync
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install requests beautifulsoup4
      - name: Run Unified Script
        # We assume the script is at the root for easier pathing in GitHub Actions
        run: python scrapers/fetch_weather.py
      - name: Commit Updates
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "War-Room-Bot"
          git add data/weather.json
          git commit -m "Unified Data Update: IMD + KSDMA [skip ci]" || exit 0
          git push
