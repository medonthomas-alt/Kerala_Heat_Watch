name: Hourly MausamGram Update

on:
  schedule:
    - cron: '0 * * * *' # Runs exactly at the start of every hour
  workflow_dispatch: # This adds the "Run workflow" button for you

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This gives the robot permission to save files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests Library
        run: pip install requests

      - name: Run Fetch Script
        run: python fetch_weather.py

      - name: Commit and Push Weather Data
        run: |
          git config --global user.name "Weather-Bot"
          git config --global user.email "actions@github.com"
          git add data/weather.json
          # The 'exit 0' prevents the robot from crying if there are no changes to the data
          git commit -m "Update Kerala weather data" || exit 0
          git push
