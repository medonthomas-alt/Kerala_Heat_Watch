<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kerala Heat Watch | കേരള ചൂട് നിരീക്ഷണം</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Malayalam:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#ffffff;--border:#e2e6ea;
  --text:#1a1f2e;--muted:#6b7280;--faint:#9ca3af;
  --normal:#16a34a;--watch:#d97706;--alert:#ea580c;--warning:#dc2626;--extreme:#7c3aed;
  --normal-bg:#f0fdf4;--watch-bg:#fffbeb;--alert-bg:#fff7ed;--warning-bg:#fef2f2;--extreme-bg:#f5f3ff;
  --normal-sun:#fbbf24;--watch-sun:#f59e0b;--alert-sun:#f97316;--warning-sun:#ef4444;--extreme-sun:#8b5cf6;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.ml{font-family:'Noto Sans Malayalam',sans-serif}

/* ── HEADER ── */
header{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  position:sticky;top:0;z-index:1000;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;background:#dc2626;flex-shrink:0;
  animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(220,38,38,.4)}
  50%{opacity:.7;box-shadow:0 0 0 6px rgba(220,38,38,0)}}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.logo-text span{color:#dc2626}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-top:1px}
.header-right{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--muted)}
.updated-badge{background:var(--bg);border:1px solid var(--border);border-radius:20px;
  padding:4px 12px;font-size:11px;color:var(--muted)}
.imd-badge{background:#1e40af;color:#fff;border-radius:20px;padding:4px 12px;font-size:10px;letter-spacing:.5px}

/* ── KSDMA ALERT ── */
.ksdma-bar{background:#fff;border-bottom:3px solid #dc2626;padding:14px 24px}
.ksdma-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ksdma-logo{background:#dc2626;color:#fff;border-radius:6px;padding:4px 10px;
  font-size:10px;font-weight:700;letter-spacing:1px}
.ksdma-title{font-size:13px;font-weight:700;color:#dc2626;letter-spacing:.3px}
.ksdma-text{font-size:13px;line-height:1.7;color:var(--text)}
.ksdma-text p{margin-bottom:4px}

/* ── LAYOUT ── */
.main-layout{display:grid;grid-template-columns:1fr 260px;gap:0;min-height:calc(100vh - 140px)}
.stations-panel{padding:20px 24px;overflow-y:auto}
.map-panel{background:#fff;border-left:1px solid var(--border);padding:16px;
  position:sticky;top:61px;height:calc(100vh - 61px);display:flex;flex-direction:column;gap:12px;overflow-y:auto}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.station-count{font-size:11px;color:var(--faint)}

/* ── STATION GRID ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* ── STATION CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.card.normal::before{background:var(--normal)}
.card.watch::before{background:var(--watch)}
.card.alert::before{background:var(--alert)}
.card.warning::before{background:var(--warning)}
.card.extreme::before{background:var(--extreme)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.station-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.station-district{font-size:10px;color:var(--muted);margin-top:2px}
.station-source{font-size:9px;color:var(--faint);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}

/* ── SUN / MOON ── */
.weather-icon{width:44px;height:44px;flex-shrink:0;position:relative}
.sun{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.sun.normal{background:radial-gradient(circle,#fef9c3,#fef08a);box-shadow:0 0 0 4px #fef08a44}
.sun.watch{background:radial-gradient(circle,#fef3c7,#fbbf24);box-shadow:0 0 0 4px #fbbf2444;animation:pulse-watch 3s ease-in-out infinite}
.sun.alert{background:radial-gradient(circle,#fed7aa,#f97316);box-shadow:0 0 0 4px #f9731644;animation:pulse-alert 2s ease-in-out infinite}
.sun.warning{background:radial-gradient(circle,#fecaca,#ef4444);box-shadow:0 0 0 4px #ef444444;animation:pulse-warn 1.5s ease-in-out infinite}
.sun.extreme{background:radial-gradient(circle,#e9d5ff,#8b5cf6);box-shadow:0 0 0 4px #8b5cf644;animation:pulse-ext 1s ease-in-out infinite}
.sun.night{background:radial-gradient(circle,#dbeafe,#93c5fd);box-shadow:0 0 0 4px #93c5fd33}
@keyframes pulse-watch{0%,100%{box-shadow:0 0 0 4px #fbbf2444}50%{box-shadow:0 0 0 8px #fbbf2422}}
@keyframes pulse-alert{0%,100%{box-shadow:0 0 0 4px #f9731644}50%{box-shadow:0 0 0 10px #f9731622}}
@keyframes pulse-warn{0%,100%{box-shadow:0 0 0 4px #ef444444}50%{box-shadow:0 0 0 12px #ef444422}}
@keyframes pulse-ext{0%,100%{box-shadow:0 0 0 6px #8b5cf644}50%{box-shadow:0 0 0 14px #8b5cf622}}

/* ── TEMP ROW ── */
.temp-row{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.temp-max{font-size:32px;font-weight:800;line-height:1;letter-spacing:-1px}
.temp-max.normal{color:var(--normal)}
.temp-max.watch{color:var(--watch)}
.temp-max.alert{color:var(--alert)}
.temp-max.warning{color:var(--warning)}
.temp-max.extreme{color:var(--extreme)}
.temp-unit{font-size:14px;color:var(--muted);font-weight:500}
.temp-min{font-size:13px;color:var(--muted);font-weight:500}

/* ── ALERT BADGE ── */
.alert-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
.alert-badge.normal{background:var(--normal-bg);color:var(--normal)}
.alert-badge.watch{background:var(--watch-bg);color:var(--watch)}
.alert-badge.alert{background:var(--alert-bg);color:var(--alert)}
.alert-badge.warning{background:var(--warning-bg);color:var(--warning)}
.alert-badge.extreme{background:var(--extreme-bg);color:var(--extreme)}

/* ── WEATHER DESC ── */
.weather-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── STATS ROW ── */
.stats-row{display:flex;gap:12px;margin-bottom:10px}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-val{font-size:13px;font-weight:600;color:var(--text)}
.stat-lbl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
.dep-pos{color:var(--alert)}
.dep-neg{color:var(--normal)}

/* ── 7-DAY STRIP ── */
.forecast-strip{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.forecast-strip::-webkit-scrollbar{height:2px}
.forecast-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.fd{flex:1;min-width:32px;text-align:center;background:var(--bg);border-radius:6px;padding:5px 2px}
.fd-day{font-size:8px;color:var(--faint);font-weight:600;margin-bottom:3px}
.fd-icon{font-size:12px;margin-bottom:2px}
.fd-max{font-size:10px;font-weight:700;color:var(--text)}
.fd-min{font-size:8px;color:var(--muted)}

/* ── CARD FOOTER ── */
.card-footer{display:flex;justify-content:space-between;align-items:center;
  padding-top:8px;border-top:1px solid var(--border);font-size:9px;color:var(--faint)}
.sunrise-info{display:flex;gap:8px}

/* ── MAP PANEL ── */
.map-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
#map{flex:1;border-radius:10px;border:1px solid var(--border);min-height:300px}
.map-legend{font-size:10px;color:var(--muted)}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── KSDMA MAPS ── */
.ksdma-maps{display:flex;flex-direction:column;gap:8px}
.ksdma-map-item{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.ksdma-map-label{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--muted);
  text-transform:uppercase;padding:5px 8px;background:var(--bg);border-bottom:1px solid var(--border)}
.ksdma-map-item img{width:100%;display:block}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:9999;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-icon{font-size:48px;animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--muted);font-weight:500}
.loading-bar{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:#dc2626;border-radius:2px;animation:fill 2.5s ease forwards}
@keyframes fill{from{width:0}to{width:100%}}

/* ── ERROR ── */
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
  padding:20px;margin:20px;font-size:13px;color:#991b1b;line-height:1.8}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .main-layout{grid-template-columns:1fr}
  .map-panel{position:static;height:auto;border-left:none;border-top:1px solid var(--border)}
  #map{min-height:250px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loading-icon">🌡️</div>
  <div class="loading-text">Kerala Heat Watch — Loading live data...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="dot"></div>
    <div>
      <div class="logo-text">Kerala <span>Heat</span> Watch</div>
      <div class="logo-sub ml">കേരള ചൂട് നിരീക്ഷണം · IMD Official Data</div>
    </div>
  </div>
  <div class="header-right">
    <div class="imd-badge">IMD LIVE</div>
    <div class="updated-badge" id="updated-time">Loading...</div>
  </div>
</header>

<!-- KSDMA ALERT BAR -->
<div class="ksdma-bar" id="ksdma-bar" style="display:none">
  <div class="ksdma-header">
    <div class="ksdma-logo">KSDMA</div>
    <div class="ksdma-title ml" id="ksdma-title"></div>
  </div>
  <div class="ksdma-text ml" id="ksdma-text"></div>
</div>

<!-- MAIN -->
<div class="main-layout">

  <!-- STATIONS PANEL -->
  <div class="stations-panel">
    <div class="section-header">
      <div class="section-title">Weather Stations</div>
      <div class="station-count" id="station-count"></div>
    </div>
    <div class="grid" id="grid"></div>
    <div id="error-area"></div>
  </div>

  <!-- MAP PANEL -->
  <div class="map-panel">
    <div class="map-title">Kerala — Station Map</div>
    <div id="map"></div>

    <div class="map-legend">
      <div class="legend-row"><div class="legend-dot" style="background:var(--normal)"></div>Normal &lt;36°C</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--watch)"></div>Watch 36–38°C</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--alert)"></div>Alert 38–40°C</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--warning)"></div>Warning &gt;40°C</div>
      <div class="legend-row"><div class="legend-dot" style="background:#aaa;border:1px solid #ddd"></div>IMD Station</div>
      <div class="legend-row"><div class="legend-dot" style="background:#aaa;border:2px solid #666;background:none"></div>AWS Station</div>
    </div>

    <div class="ksdma-maps" id="ksdma-maps"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const WEATHER_URL = 'data/weather.json';
const GEOJSON_URL = 'https://raw.githubusercontent.com/medonthomas-alt/Kerala_Open_Maps/main/data/administrative/districts/Kerala_LGD_Districts.geojson';

// ── HELPERS ───────────────────────────────────────────────────────────────
const alertColors = {
  normal:  'var(--normal)',
  watch:   'var(--watch)',
  alert:   'var(--alert)',
  warning: 'var(--warning)',
  extreme: 'var(--extreme)',
  unknown: 'var(--muted)',
};

function getAlertLevel(temp) {
  if (!temp) return 'unknown';
  if (temp >= 42) return 'extreme';
  if (temp >= 40) return 'warning';
  if (temp >= 38) return 'alert';
  if (temp >= 36) return 'watch';
  return 'normal';
}

function isNight(sunrise, sunset) {
  if (!sunrise || !sunset) return false;
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const nowMin = h * 60 + m;
  const parseTime = t => {
    const parts = t.split(':');
    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  };
  const srMin = parseTime(sunrise);
  const ssMin = parseTime(sunset);
  // Convert UTC to IST (UTC+5:30)
  const istMin = (nowMin + 5*60 + 30) % (24*60);
  return istMin < srMin || istMin > ssMin;
}

function weatherEmoji(desc) {
  if (!desc) return '🌤';
  const d = desc.toLowerCase();
  if (d.includes('thunder') || d.includes('lightning')) return '⛈';
  if (d.includes('heavy rain') || d.includes('moderate rain')) return '🌧';
  if (d.includes('light rain') || d.includes('drizzle')) return '🌦';
  if (d.includes('rain') || d.includes('shower')) return '🌦';
  if (d.includes('snow')) return '❄';
  if (d.includes('fog') || d.includes('mist') || d.includes('haze')) return '🌫';
  if (d.includes('dust') || d.includes('storm')) return '🌪';
  if (d.includes('generally cloudy') || d.includes('overcast')) return '☁';
  if (d.includes('partly cloudy')) return '⛅';
  if (d.includes('mainly clear') || d.includes('clear')) return '☀';
  return '🌤';
}

function dayLabel(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
}

function fmtTime(t) {
  if (!t) return '--';
  return t.substring(0,5);
}

function fmtDep(dep) {
  if (dep === null || dep === undefined) return '--';
  const sign = dep > 0 ? '+' : '';
  const cls  = dep > 0 ? 'dep-pos' : dep < 0 ? 'dep-neg' : '';
  return `<span class="${cls}">${sign}${dep}°</span>`;
}

function fmtUpdated(fetchedAt) {
  if (!fetchedAt) return 'Unknown';
  const d = new Date(fetchedAt);
  // IST = UTC + 5:30
  const ist = new Date(d.getTime() + (5.5 * 60 * 60 * 1000));
  const h = ist.getUTCHours().toString().padStart(2,'0');
  const m = ist.getUTCMinutes().toString().padStart(2,'0');
  const day = ist.toUTCString().split(' ').slice(0,4).join(' ');
  return `${h}:${m} IST`;
}

// ── BUILD STATION CARD ────────────────────────────────────────────────────
function buildCard(st) {
  const temp    = st.fc_max ?? st.obs_max;
  const tempMin = st.fc_min;
  const level   = st.alert?.level ?? getAlertLevel(temp);
  const mlLabel = st.alert?.ml ?? '--';
  const night   = isNight(st.sunrise, st.sunset);
  const dep     = st.fc_dep ?? st.obs_dep;
  const hum     = st.humidity;
  const rain    = st.rainfall;

  // Sun / moon icon
  const sunClass = night ? 'night' : level;
  const sunEmoji = night ? '🌙' : '☀️';

  // Forecast days
  const days = [2,3,4,5,6,7].map(i => ({
    day:     dayLabel(i - 1),
    max:     st[`day${i}_max`],
    min:     st[`day${i}_min`],
    weather: st[`day${i}_weather`],
  }));

  const forecastHtml = days.map(d => `
    <div class="fd">
      <div class="fd-day">${d.day}</div>
      <div class="fd-icon">${weatherEmoji(d.weather)}</div>
      <div class="fd-max">${d.max ?? '--'}°</div>
      <div class="fd-min">${d.min ?? '--'}°</div>
    </div>`).join('');

  const sourceLabel = st.source === 'observed' ? 'AWS' : 'IMD';

  return `
  <div class="card ${level}">
    <div class="card-top">
      <div>
        <div class="station-name">${st.name}</div>
        <div class="station-district">${st.district}</div>
        <div class="station-source">${sourceLabel} · ${st.stat_code}</div>
      </div>
      <div class="weather-icon">
        <div class="sun ${sunClass}">${sunEmoji}</div>
      </div>
    </div>

    <div class="temp-row">
      <div class="temp-max ${level}">${temp ?? '--'}</div>
      <div class="temp-unit">°C</div>
      ${tempMin ? `<div class="temp-min">/ ${tempMin}°</div>` : ''}
    </div>

    <div class="alert-badge ${level} ml">${mlLabel}</div>

    <div class="weather-desc">${st.fc_weather ?? st.obs_weather ?? 'Weather data unavailable'}</div>

    <div class="stats-row">
      ${hum !== null && hum !== undefined ? `
      <div class="stat">
        <div class="stat-val">💧 ${hum}%</div>
        <div class="stat-lbl">Humidity</div>
      </div>` : ''}
      ${dep !== null && dep !== undefined ? `
      <div class="stat">
        <div class="stat-val">${fmtDep(dep)}</div>
        <div class="stat-lbl">Departure</div>
      </div>` : ''}
      ${rain && rain !== 'NIL' ? `
      <div class="stat">
        <div class="stat-val">🌧 ${rain}mm</div>
        <div class="stat-lbl">Rainfall</div>
      </div>` : ''}
    </div>

    <div class="forecast-strip">${forecastHtml}</div>

    <div class="card-footer">
      <div class="sunrise-info">
        <span>🌅 ${fmtTime(st.sunrise)}</span>
        <span>🌇 ${fmtTime(st.sunset)}</span>
      </div>
      <div>IMD · ${fmtUpdated(null)}</div>
    </div>
  </div>`;
}

// ── INIT MAP ──────────────────────────────────────────────────────────────
const map = L.map('map', {zoomControl:false}).setView([10.5, 76.2], 6);
L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CartoDB', maxZoom:18
}).addTo(map);

// ── MAIN INIT ─────────────────────────────────────────────────────────────
async function init() {
  try {
    // Load both in parallel
    const [weatherRes, geoRes] = await Promise.all([
      fetch(WEATHER_URL),
      fetch(GEOJSON_URL)
    ]);

    const data     = await weatherRes.json();
    const geoData  = await geoRes.json();

    // District GeoJSON
    L.geoJSON(geoData, {
      style: { color:'#94a3b8', weight:1.2, fillColor:'#f8fafc', fillOpacity:.6 }
    }).addTo(map);

    // Header update time
    document.getElementById('updated-time').textContent =
      'Updated ' + fmtUpdated(data.meta?.fetched_at);

    // KSDMA alert bar
    const paras = data.meta?.alert_paragraphs ?? [];
    if (paras.length > 0) {
      const bar = document.getElementById('ksdma-bar');
      bar.style.display = 'block';
      // First para is often the org name, second is title, rest is body
      const title = paras[1] ?? paras[0] ?? '';
      const body  = paras.slice(2).map(p => `<p>${p}</p>`).join('');
      document.getElementById('ksdma-title').textContent = title;
      document.getElementById('ksdma-text').innerHTML = body;
    }

    // KSDMA maps in side panel
    const mapsPanel = document.getElementById('ksdma-maps');
    const mapItems = [
      { label:'MAX TEMP MAP', url: data.meta?.max_map },
      { label:'MIN TEMP MAP', url: data.meta?.min_map },
      { label:'HUMIDITY MAP', url: data.meta?.humid_map },
    ].filter(m => m.url);

    if (mapItems.length > 0) {
      mapsPanel.innerHTML = `<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">KSDMA Maps</div>` +
        mapItems.map(m => `
          <div class="ksdma-map-item">
            <div class="ksdma-map-label">${m.label}</div>
            <img src="${m.url}" alt="${m.label}" loading="lazy" onerror="this.parentElement.style.display='none'"/>
          </div>`).join('');
    }

    // Station count
    const stations = data.stations ?? [];
    document.getElementById('station-count').textContent =
      `${stations.length} stations · ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})}`;

    // Build cards
    const grid = document.getElementById('grid');
    const fetchedAt = data.meta?.fetched_at;
    grid.innerHTML = stations.map(st => {
      // Inject fetched_at into card footer
      return buildCard(st).replace('IMD · ' + fmtUpdated(null), 'IMD · ' + fmtUpdated(fetchedAt));
    }).join('');

    // Map markers
    const alertColorMap = {
      normal:'#16a34a', watch:'#d97706', alert:'#ea580c',
      warning:'#dc2626', extreme:'#7c3aed', unknown:'#6b7280'
    };

    stations.forEach(st => {
      if (!st.lat || !st.lon) return;
      const temp  = st.fc_max ?? st.obs_max;
      const level = st.alert?.level ?? getAlertLevel(temp);
      const color = alertColorMap[level] ?? '#6b7280';
      const isAWS = st.source === 'observed';

      const marker = L.circleMarker([st.lat, st.lon], {
        radius:      isAWS ? 5 : 7,
        fillColor:   isAWS ? '#fff' : color,
        color:       color,
        weight:      isAWS ? 2 : 1.5,
        fillOpacity: isAWS ? 0 : 0.9,
      }).addTo(map);

      marker.bindPopup(`
        <div style="font-family:'Outfit',sans-serif;min-width:140px">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px">${st.name}</div>
          <div style="font-size:20px;font-weight:800;color:${color}">${temp ?? '--'}°C</div>
          <div style="font-size:11px;color:#666;margin-top:2px">${st.fc_weather ?? ''}</div>
          ${st.humidity ? `<div style="font-size:11px;color:#888;margin-top:4px">💧 ${st.humidity}% humidity</div>` : ''}
          <div style="font-size:10px;color:#999;margin-top:4px">${st.source === 'observed' ? 'AWS Station' : 'IMD Station'}</div>
        </div>`, { maxWidth: 200 });
    });

    // Hide loading
    document.getElementById('loading').style.display = 'none';

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-area').innerHTML = `
      <div class="error-box">
        <strong>Unable to load weather data.</strong><br>
        Please check your internet connection or try again in a few minutes.<br>
        <small style="color:#9ca3af">${e.message}</small>
      </div>`;
  }
}

init();

// Auto-refresh every 30 minutes
setInterval(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
